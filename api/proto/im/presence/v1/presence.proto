syntax = "proto3";
package im.presence.v1;
enum PresenceStatus { PRESENCE_STATUS_UNSPECIFIED = 0; PRESENCE_STATUS_ONLINE = 1; PRESENCE_STATUS_OFFLINE = 2; PRESENCE_STATUS_BUSY = 3; PRESENCE_STATUS_INVISIBLE = 4; }
message PresenceSubscribeRequest { repeated uint64 user_ids = 1; }
message PresenceEvent { uint64 user_id = 1; PresenceStatus status = 2; repeated string online_device_ids = 3; int64 changed_at_ms = 4; }
