syntax = "proto3";
package im.receipt.v1;
message DeliveryAckRequest { uint64 conversation_id = 1; string device_id = 2; repeated uint64 seqs = 3; uint64 max_delivered_seq = 4; }
message ReadAckRequest { uint64 conversation_id = 1; string device_id = 2; uint64 read_seq = 3; }
message ReceiptEvent { uint64 conversation_id = 1; uint64 user_id = 2; string device_id = 3; uint64 delivered_seq = 4; uint64 read_seq = 5; int64 updated_at_ms = 6; }
