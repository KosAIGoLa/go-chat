apiVersion: apps/v1
kind: Deployment
metadata:
  name: ck-chat-gateway
spec:
  replicas: 3
  selector:
    matchLabels: { app: ck-chat-gateway }
  template:
    metadata:
      labels: { app: ck-chat-gateway }
    spec:
      containers:
        - name: gateway
          image: ck-chat/gateway:dev
          ports:
            - containerPort: 8080
